
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pacs_postgres
    restart: always
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-pacs_db}
      POSTGRES_USER: ${DB_USER:-pacs_user}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-v2/database/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: pacs_orthanc
    restart: always
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"   # Web UI + REST API
      - "${ORTHANC_DICOM_PORT:-4242}:4242"  # DICOM protocol
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_data:/var/lib/orthanc/db

volumes:
  postgres_data:
  orthanc_data:
